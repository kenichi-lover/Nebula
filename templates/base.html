<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>
{% block title %}
Nebula
{% endblock %}
</title>
<script src="{{ url_for('static', path='js/tailwindcss.js') }}"></script>
<script>
tailwind.config = {
    darkMode:'class'
}
</script>
<link rel="stylesheet" href="{{ url_for('static', path='css/theme.css') }}">
<link rel="stylesheet" href="{{ url_for('static', path='css/glass.css') }}">
</head>
<body>
<div class="bg-orb-cyan"></div>
<div class="bg-orb-purple"></div>

{% include 'navbar.html' %}

{% block content %}
{% endblock %}

<!-- Auth Modal -->
<div id="authModal" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeAuthModal()"></div>

    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-md p-6">
        <div class="glass-card p-8 shadow-2xl relative">
            <button onclick="closeAuthModal()" class="absolute top-4 right-4 text-slate-400 hover:text-white transition">✕</button>

            <div class="flex gap-4 mb-6 border-b border-white/10 pb-2">
                <button id="tabLogin" onclick="switchTab('login')" class="pb-2 text-sm font-medium text-sky-400 border-b-2 border-sky-400 transition">Login</button>
                <button id="tabRegister" onclick="switchTab('register')" class="pb-2 text-sm font-medium text-slate-400 hover:text-slate-200 transition">Register</button>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Username</label>
                        <input type="text" name="username" required class="w-full px-4 py-2 rounded-xl bg-white/10 dark:bg-slate-800/30 border border-white/20 dark:border-slate-700 text-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-sky-500/50">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Password</label>
                        <input type="password" name="password" required minlength="6" class="w-full px-4 py-2 rounded-xl bg-white/10 dark:bg-slate-800/30 border border-white/20 dark:border-slate-700 text-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-sky-500/50">
                    </div>
                    <button type="submit" class="w-full py-2 rounded-xl bg-sky-500/20 text-sky-300 border border-sky-500/30 hover:bg-sky-500/30 transition font-medium">Login</button>
                </div>
                <p id="loginError" class="mt-3 text-sm text-red-400 hidden"></p>
            </form>

            <form id="registerForm" onsubmit="handleRegister(event)" class="hidden">
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Username</label>
                        <input type="text" name="username" required minlength="3" class="w-full px-4 py-2 rounded-xl bg-white/10 dark:bg-slate-800/30 border border-white/20 dark:border-slate-700 text-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-sky-500/50">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Email</label>
                        <input type="email" name="email" required class="w-full px-4 py-2 rounded-xl bg-white/10 dark:bg-slate-800/30 border border-white/20 dark:border-slate-700 text-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-sky-500/50">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Password</label>
                        <input type="password" name="password" required minlength="6" class="w-full px-4 py-2 rounded-xl bg-white/10 dark:bg-slate-800/30 border border-white/20 dark:border-slate-700 text-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-sky-500/50">
                    </div>
                    <button type="submit" class="w-full py-2 rounded-xl bg-sky-500/20 text-sky-300 border border-sky-500/30 hover:bg-sky-500/30 transition font-medium">Register</button>
                </div>
                <p id="registerError" class="mt-3 text-sm text-red-400 hidden"></p>
            </form>
        </div>
    </div>
</div>

<script src="{{ url_for('static', path='js/theme.js') }}"></script>
<script>
// ===== Auth Modal =====
function openAuthModal(tab) {
    document.getElementById('authModal').classList.remove('hidden');
    switchTab(tab || 'login');
}

function closeAuthModal() {
    document.getElementById('authModal').classList.add('hidden');
    document.getElementById('loginError').classList.add('hidden');
    document.getElementById('registerError').classList.add('hidden');
}

function switchTab(tab) {
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const tabLogin = document.getElementById('tabLogin');
    const tabRegister = document.getElementById('tabRegister');

    if (tab === 'login') {
        loginForm.classList.remove('hidden');
        registerForm.classList.add('hidden');
        tabLogin.className = 'pb-2 text-sm font-medium text-sky-400 border-b-2 border-sky-400 transition';
        tabRegister.className = 'pb-2 text-sm font-medium text-slate-400 hover:text-slate-200 transition';
    } else {
        loginForm.classList.add('hidden');
        registerForm.classList.remove('hidden');
        tabLogin.className = 'pb-2 text-sm font-medium text-slate-400 hover:text-slate-200 transition';
        tabRegister.className = 'pb-2 text-sm font-medium text-sky-400 border-b-2 border-sky-400 transition';
    }
}

// ===== API Calls =====
async function handleLogin(e) {
    e.preventDefault();
    const form = e.target;
    const errorEl = document.getElementById('loginError');

    try {
        const res = await fetch('/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                username: form.username.value,
                password: form.password.value
            })
        });
        const data = await res.json();

        if (!res.ok) throw new Error(data.detail || 'Login failed');

        localStorage.setItem('nebula_token', data.access_token);
        window.location.reload();
    } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.remove('hidden');
    }
}

async function handleRegister(e) {
    e.preventDefault();
    const form = e.target;
    const errorEl = document.getElementById('registerError');

    try {
        const res = await fetch('/auth/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                username: form.username.value,
                email: form.email.value,
                password: form.password.value
            })
        });
        const data = await res.json();

        if (!res.ok) throw new Error(data.detail || 'Registration failed');

        // Auto login
        const loginRes = await fetch('/auth/login', {
            method: 'POST',
            credentials: 'same-origin',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                username: form.username.value,
                password: form.password.value
            })
        });
        const loginData = await loginRes.json();

        localStorage.setItem('nebula_token', loginData.access_token);
        window.location.reload();
    } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.remove('hidden');
    }
}

function getToken() {
    return localStorage.getItem('nebula_token');
}

function logout() {
    localStorage.removeItem('nebula_token');
    window.location.reload();
}

// ===== Navbar Auth State =====
(async function initAuth() {
    const token = getToken();
    const btnLogin = document.getElementById('navBtnLogin');
    const userMenu = document.getElementById('navUserMenu');
    const userName = document.getElementById('navUserName');

    if (!token) {
        if (btnLogin) btnLogin.classList.remove('hidden');
        if (userMenu) userMenu.classList.add('hidden');
        return;
    }

    try {
        const res = await fetch('/auth/me', {
            headers: {'Authorization': 'Bearer ' + token}
        });
        if (!res.ok) throw new Error('Invalid token');

        const user = await res.json();
        if (btnLogin) btnLogin.classList.add('hidden');
        if (userMenu) userMenu.classList.remove('hidden');
        if (userName) userName.textContent = user.username;
    } catch (e) {
        localStorage.removeItem('nebula_token');
        if (btnLogin) btnLogin.classList.remove('hidden');
        if (userMenu) userMenu.classList.add('hidden');
    }
})();
</script>
</body>
</html>
