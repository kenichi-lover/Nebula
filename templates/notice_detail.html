{% extends "base.html" %}

{% block content %}

<div class="max-w-4xl mx-auto">

    <h1 class="text-3xl font-bold mb-4">
        {{ card.title }}
    </h1>
    <div class="flex items-center gap-4 mb-6">
        <a
            href="{{ url_for('notice_edit_form', slug=card.slug) }}"
            class="
                px-4
                py-2
                rounded-xl
                text-sm
                font-medium
                bg-white/20
                dark:bg-slate-800/30
                border
                border-white/20
                dark:border-white/10
                text-slate-700
                dark:text-slate-300
                hover:scale-[1.02]
                transition-all
            "
        >
            ✏️ Edit
        </a>
    </div>
    <div class="text-sm text-gray-500 mb-6">
        {{ card.created_at }}
    </div>

    <div class="prose max-w-none, dark:prose-invert">
        {{ content_html | safe }}
    </div>

    <!-- 放在 content 底部 -->
<div class="mt-12 pt-6 border-t border-white/20 dark:border-slate-700">
    <a
        href="/"
        class="text-sm text-slate-500 dark:text-slate-400 hover:text-sky-500 transition-colors"
    >
        ← Back to all notices
    </a>
</div>

</div>

{% endblock %}
