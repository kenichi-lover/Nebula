<script>
// 检测登录状态并切换 UI
function checkAuthStatus() {
    const token = localStorage.getItem('access_token');
    const btnLogin = document.getElementById('navBtnLogin');
    const userMenu = document.getElementById('navUserMenu');
    const userName = document.getElementById('navUserName');
    
    if (token) {
        // 已登录：显示用户菜单，隐藏登录按钮
        btnLogin?.classList.add('hidden');
        userMenu?.classList.remove('hidden');
        
        // 尝试解析 token 中的用户名（可选）
        try {
            const payload = JSON.parse(atob(token.split('.')[1]));
            if (payload.sub && userName) {
                // 这里可以发请求获取用户名，或者从其他存储读取
                const savedName = localStorage.getItem('username');
                if (savedName) userName.textContent = savedName;
            }
        } catch (e) {
            // ignore
        }
    } else {
        // 未登录：显示登录按钮，隐藏用户菜单
        btnLogin?.classList.remove('hidden');
        userMenu?.classList.add('hidden');
    }
}

// 登出
async function logout() {
    try {
        await fetch('/auth/logout', { 
            method: 'POST',
            credentials: 'same-origin'  // 携带 Cookie
        });
    } catch (e) {
        console.error('Logout error:', e);
    }
    
    // 清除本地存储
    localStorage.removeItem('access_token');
    localStorage.removeItem('username');
    
    // 刷新页面
    window.location.href = '/';
}

// 登录成功后调用这个函数更新 UI
function onLoginSuccess(token, username) {
    localStorage.setItem('access_token', token);
    if (username) localStorage.setItem('username', username);
    checkAuthStatus();
    closeAuthModal();  // 关闭登录弹窗
    window.location.reload();  // 刷新页面让后端模板也拿到 user
}

// 页面加载时检测
document.addEventListener('DOMContentLoaded', checkAuthStatus);
</script>
