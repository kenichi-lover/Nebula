{% extends "base.html" %}

{% block content %}

<div
class="
max-w-5xl
mx-auto
mt-8
p-8

glass-card
shadow-2xl
"
>

<!-- Header -->

<div
class="
flex
flex-col
md:flex-row

md:items-center
md:justify-between

gap-4
mb-8
"
>

<div>

<h2
class="
text-3xl
font-bold

text-slate-800
dark:text-white
"
>
Create Notice
</h2>

<p
class="
mt-1

text-slate-500
dark:text-slate-400
"
>
Publish a new announcement to Nebula
</p>

</div>

<div>

<span
class="
px-3
py-1

rounded-full

text-sm

bg-white/20
dark:bg-slate-800/30

border
border-white/20
dark:border-white/10

text-slate-700
dark:text-slate-300
"
>
Draft
</span>

</div>

</div>

<!-- Divider -->

<div
class="
h-px
mb-8

bg-white/20
dark:bg-slate-700
"
></div>

<!-- Form Card -->

<div
class="
glass-card
p-6
"
>

<form
method="post"
action="/notice/new"
class="space-y-6"
>

<!-- Title -->

<div>

<label
class="
block
mb-2

text-sm
font-medium

text-slate-700
dark:text-slate-300
"
>
Title
</label>

<input
name="title"
type="text"

required

placeholder="Notice title..."

class="
w-full

px-4
py-3

rounded-2xl

bg-white/20
dark:bg-slate-900/20

border
border-white/20
dark:border-white/10

text-slate-800
dark:text-white

placeholder:text-slate-500
dark:placeholder:text-slate-400

outline-none

focus:ring-2
focus:ring-sky-400/50
"
/>

</div>

<!-- Category + Priority -->

<div
class="
grid
grid-cols-1
md:grid-cols-2
gap-4
"
>

<div>

<label
class="
block
mb-2

text-sm
font-medium

text-slate-700
dark:text-slate-300
"
>
Category
</label>

<select
name="category"

class="
w-full

px-4
py-3

rounded-2xl

bg-white/20
dark:bg-slate-900/20

border
border-white/20
dark:border-white/10

text-slate-800
dark:text-white

outline-none

focus:ring-2
focus:ring-sky-400/50
"
>

<option value="General">
General
</option>

<option value="System">
System
</option>

<option value="Development">
Development
</option>

<option value="Security">
Security
</option>

<option value="Personal">
Personal
</option>

</select>

</div>

<div>

<label
class="
block
mb-2

text-sm
font-medium

text-slate-700
dark:text-slate-300
"
>
Priority
</label>

<select
name="priority"

class="
w-full

px-4
py-3

rounded-2xl

bg-white/20
dark:bg-slate-900/20

border
border-white/20
dark:border-white/10

text-slate-800
dark:text-white

outline-none

focus:ring-2
focus:ring-sky-400/50
"
>

<option value="low">
Low
</option>

<option value="normal" selected>
Normal
</option>

<option value="high">
High
</option>

</select>

</div>

</div>

<!-- Content -->

<div>

<label
class="
block
mb-2

text-sm
font-medium

text-slate-700
dark:text-slate-300
"
>
Content
</label>

<textarea
name="content"

rows="12"

required

placeholder="Write your notice..."

class="
w-full

px-4
py-3

rounded-2xl

bg-white/20
dark:bg-slate-900/20

border
border-white/20
dark:border-white/10

text-slate-800
dark:text-white

placeholder:text-slate-500
dark:placeholder:text-slate-400

outline-none

focus:ring-2
focus:ring-sky-400/50
"
></textarea>

</div>

<!-- Pinned -->

<div>

<label
class="
flex
items-center
gap-3

cursor-pointer

text-slate-700
dark:text-slate-300
"
>

<input
type="checkbox"
name="pinned"

class="
w-4
h-4
"
/>

📌 Pin to top

</label>

</div>

<!-- Actions -->

<div
class="
flex
items-center
justify-end
gap-3
pt-4
"
>

<a
href="/"

class="
px-5
py-3

rounded-2xl

bg-white/15
dark:bg-slate-800/30

border
border-white/20

text-slate-700
dark:text-slate-300

hover:scale-[1.02]

transition-all
"
>
Cancel
</a>

<button
type="submit"

class="
px-6
py-3

rounded-2xl

bg-gradient-to-r
from-sky-500
to-cyan-500

text-white
font-medium

shadow-lg

hover:scale-[1.02]

transition-all
duration-300
"
>
Publish Notice
</button>

</div>

</form>

</div>

</div>

{% endblock %}
